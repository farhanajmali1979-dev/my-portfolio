<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>

    <style>

        body{
            text-align:center;
            font-family:Arial;
            margin-top:100px;
            background:#f4f4f4;
        }

        h1{
            font-size:50px;
            color:blue;
        }

    </style>

</head>

<body>

<h2>Digital Clock</h2>

<h1 id="clock"></h1>

<script>

function showTime(){

    let time = new Date();

    document.getElementById("clock").innerHTML =
    time.toLocaleTimeString();

}

setInterval(showTime,1000);

showTime();

</script>

</body>
</html>
